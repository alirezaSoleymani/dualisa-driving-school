<section class="hero">
  <div class="navbar-container">
    <app-navbar></app-navbar>
  </div>

  <div class="content">
    <p>{{content().title}}</p>
  </div>
</section>

<section class="services">
  @for (service of content().servicesDetails; track $index) {
  <div class="service-card">
    <div
      class="service-image"
      [style.background-image]="'url(' + service.imagePath +')'"
    >
      <p class="service-title">{{service.title}}</p>
    </div>

    <div class="service-description">{{service.description}}</div>
  </div>
  }
</section>
